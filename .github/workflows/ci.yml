name: CI
on: { pull_request: { }, push: { branches: [ main ] } }
jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build container
        uses: infrabits/ci-pack@main
        with:
          image: ghcr.io/${{ github.repository }}:${{ github.sha }}
          use_builder: latest
